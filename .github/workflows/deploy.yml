name: Deploy to EC2

on:
  push:
    branches:
      - main
   workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/providers || git clone https://github.com/ServEase-Innovations/providers.git && cd providers

            git pull origin main

            # Stop old container
            docker rm -f providers-api || true

            # Build new image
            docker build -t providers-api .

            # Run container
            docker run -d \
              -p 4000:4000 \
              --env-file .env.prod \
              --name providers-api \
              --restart always \
              providers-api
